<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
            font-size: 40px;
            color: black;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("https://raw.githubusercontent.com/DeviousGroup/deviousgroup.github.io/main/assets/deviousgroup.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 1;
            z-index: -1;
        }
    </style>
</head>
<body>
    no skiddy diddy plz
</body>
</html>
